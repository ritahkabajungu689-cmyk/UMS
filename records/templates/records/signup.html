{% extends 'records/base.html' %}
{% block auth_content %}
<div class="bg-white p-8 rounded-md shadow-md border border-cardBorder">
    <div class="flex items-center justify-center mb-6">
        <div class="w-12 h-12 rounded-full bg-sidebar flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"></path></svg>
        </div>
    </div>
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Create UMS Account</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-red-500 text-xs mt-1">
                        {{ field.errors|join:", " }}
                    </div>
                {% endif %}
            </div>
        {% endfor %}
        <button type="submit" class="w-full bg-sidebar text-white font-medium py-2 rounded hover:bg-sidebarActive transition mt-4">Sign Up</button>
        
        <div class="mt-6 text-center text-sm text-slate-600">
            Already have an account? <a href="{% url 'login' %}" class="text-sidebar font-semibold hover:underline">Log in</a>
        </div>
    </form>
</div>
{% endblock %}
