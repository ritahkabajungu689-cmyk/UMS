{% extends 'records/base.html' %}
{% block auth_content %}
<div class="bg-white p-8 rounded-md shadow-md border border-cardBorder">
    <div class="flex items-center justify-center mb-6">
        <div class="w-12 h-12 rounded-full bg-sidebar flex items-center justify-center">
            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
        </div>
    </div>
    <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Login to UMS</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" name="username" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-sidebar focus:ring-1 focus:ring-sidebar" required>
        </div>
        <div class="mb-6">
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" name="password" class="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:border-sidebar focus:ring-1 focus:ring-sidebar" required>
        </div>
        <button type="submit" class="w-full bg-sidebar text-white font-medium py-2 rounded hover:bg-sidebarActive transition">Login</button>
        
        <div class="mt-6 text-center text-sm text-slate-600">
            Don't have an account? <a href="{% url 'signup' %}" class="text-sidebar font-semibold hover:underline">Sign up</a>
        </div>
    </form>
</div>
{% endblock %}
